<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trip Studio</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="print.css">
</head>
<body data-view="auth">
  <header class="app-header no-print">
    <div class="app-header-left">
      <strong class="brand">Trip Studio</strong>
      <button id="backToTripsBtn" class="btn ghost" hidden>← All trips</button>
    </div>
    <div class="app-header-right">
      <span id="saveStatus" class="save-status" hidden>Saved</span>
      <button id="printTripBtn" class="btn ghost" hidden title="Open print preview">🖨 Print PDF</button>
      <span id="userBadge" class="user-badge" hidden></span>
      <button id="signOutBtn" class="btn ghost" hidden>Sign out</button>
      <button id="settingsBtn" class="btn icon" title="Connection settings">⚙</button>
    </div>
  </header>

  <main id="app">
    <section id="view-auth" class="view view-auth" hidden></section>
    <section id="view-trips" class="view view-trips" hidden></section>

    <section id="view-trip" class="view view-trip" hidden>
      <nav class="trip-tabs no-print" id="tripTabs" role="tablist">
        <button data-page="overview"  role="tab">Overview</button>
        <button data-page="itinerary" role="tab">Itinerary</button>
        <button data-page="prepare"   role="tab">Prepare</button>
        <button data-page="today"     role="tab">Today</button>
        <button data-page="notes"     role="tab">Notes</button>
        <button data-page="io"        role="tab">Import / Export</button>
      </nav>
      <div id="tripPage" class="trip-page"></div>
    </section>
  </main>

  <nav class="mobile-nav no-print" id="mobileNav" hidden role="tablist">
    <button data-page="today"     role="tab">Today</button>
    <button data-page="itinerary" role="tab">Plan</button>
    <button data-page="prepare"   role="tab">Checklist</button>
    <button data-page="notes"     role="tab">Notes</button>
  </nav>

  <dialog id="settingsDialog" class="settings-dialog no-print">
    <form method="dialog">
      <h3>Supabase connection</h3>
      <p class="muted">
        Stored only in this browser's localStorage. The deployed site uses
        repo Secrets via GitHub Actions and ignores these unless you set them.
      </p>
      <p id="sbConfigSource" class="muted"></p>
      <label>Project URL
        <input id="sbUrl" type="url" placeholder="https://xxxx.supabase.co">
      </label>
      <label>Publishable / anon key
        <input id="sbKey" type="text" placeholder="sb_publishable_... or eyJ...">
      </label>
      <menu>
        <button value="cancel">Cancel</button>
        <button value="disconnect" type="submit">Clear local override</button>
        <button value="connect" type="submit" class="primary">Save &amp; reload</button>
      </menu>
    </form>
  </dialog>

  <div id="toast" class="toast no-print" hidden></div>

  <script src="config.js" onerror="this.dataset.missing='1'"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
