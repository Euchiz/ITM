<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Itinerary Studio</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="print.css">
</head>
<body data-view="auth" data-mode="edit">
  <header class="app-header no-print">
    <div class="app-header-left">
      <strong class="brand">Itinerary Studio</strong>
      <button id="backToTripsBtn" class="btn ghost" hidden>← All trips</button>
    </div>
    <div class="app-header-right">
      <span id="userBadge" class="user-badge" hidden></span>
      <button id="signOutBtn" class="btn ghost" hidden>Sign out</button>
      <button id="settingsBtn" class="btn icon" title="Connection settings">⚙</button>
    </div>
  </header>

  <main id="app">
    <section id="view-auth" class="view view-auth no-print" hidden></section>
    <section id="view-trips" class="view view-trips no-print" hidden></section>

    <section id="view-editor" class="view view-editor" hidden>
      <div class="editor-toolbar no-print">
        <span class="doc-title-wrap">
          <input id="docTitle" type="text" placeholder="Untitled itinerary" />
        </span>
        <span id="saveStatus" class="save-status" hidden></span>
        <span class="editor-toolbar-spacer"></span>
        <div class="mode-toggle" role="tablist">
          <button data-mode="edit" class="active" role="tab">Edit</button>
          <button data-mode="render" role="tab">Render</button>
        </div>
        <span class="editor-toolbar-spacer"></span>
        <label class="btn ghost">
          Import .md
          <input id="importFile" type="file" accept=".md,text/markdown,text/plain" hidden>
        </label>
        <button id="loadSample" class="btn ghost">Sample</button>
        <button id="exportMd" class="btn ghost">Export .md</button>
        <button id="exportHtml" class="btn ghost">Export .html</button>
        <button id="saveBtn" class="btn ghost">Save</button>
        <button id="printBtn" class="btn primary">Print / PDF</button>
      </div>
      <div id="editor" class="editor"></div>
      <div id="render" class="render printable"></div>
    </section>
  </main>

  <dialog id="settingsDialog" class="settings-dialog no-print">
    <form method="dialog">
      <h3>Supabase connection</h3>
      <p class="muted">
        Stored only in this browser's localStorage. The deployed site uses
        repo Secrets via GitHub Actions and ignores these unless you set them.
      </p>
      <p id="sbConfigSource" class="muted"></p>
      <label>Project URL
        <input id="sbUrl" type="url" placeholder="https://xxxx.supabase.co">
      </label>
      <label>Publishable / anon key
        <input id="sbKey" type="text" placeholder="sb_publishable_... or eyJ...">
      </label>
      <menu>
        <button value="cancel">Cancel</button>
        <button value="disconnect" type="submit">Clear local override</button>
        <button value="connect" type="submit" class="primary">Save &amp; reload</button>
      </menu>
    </form>
  </dialog>

  <div id="toast" class="toast no-print" hidden></div>

  <!-- Optional baked config from GitHub Actions (Supabase URL/key from repo Secrets).
       404 in local dev is fine — the app falls back to the ⚙ settings dialog. -->
  <script src="config.js" onerror="this.dataset.missing='1'"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
