<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: subtle viridian gradient with a soft glow -->
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.45" r="0.65">
      <stop offset="0%" stop-color="#4e9f92"/>
      <stop offset="60%" stop-color="#2f7d72"/>
      <stop offset="100%" stop-color="#1d4a44"/>
    </radialGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a4d7cb"/>
      <stop offset="100%" stop-color="#4e9f92"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
  <!-- Center mark — a stylised dot for "you are here" -->
  <circle cx="256" cy="256" r="84" fill="url(#dot)" />
  <circle cx="256" cy="256" r="34" fill="#1d4a44" opacity="0.45" />
  <!-- Subtle compass tick at top -->
  <rect x="252" y="100" width="8" height="36" rx="4" fill="rgba(255,255,255,0.45)" />
</svg>
